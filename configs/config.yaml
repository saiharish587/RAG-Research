# SLM RAG Benchmark Configuration

# Experimental Parameters
experiment:
  runs_per_config: 10
  seed: 42
  metrics:
    - answer_accuracy
    - context_utilization
    - precision_at_k
    - recall_at_k
    - hallucination_rate
    - latency
    - memory_usage

# Document Processing
chunking:
  chunk_size: 1500
  chunk_overlap: 150

# Embedding Configuration
embedding:
  model_name: "BAAI/bge-small-en-v1.5"
  device: "cpu"  # or "cuda"

# Vector Database
vector_db:
  provider: "faiss"
  path: "vector_db/faiss_index"
  documents_dir: "notebooks"


models:
  - name: "hf.co/ibm-granite/granite-4.0-h-350m-GGUF:Q4_K_M"
    display_name: "Granite 350M"
  - name: "qwen2.5:0.5b"
    display_name: "Qwen2.5 0.5B"
  - name: "qwen3.5:0.8b"
    display_name: "Qwen3.5 0.8B"

# Retrieval Configurations
retrieval:
  top_k: 3
  rerank: true
  rerank_model: "BAAI/bge-reranker-base"
